name: Bundle CI

on:
  push:
    paths:
      - .github/workflows/bundle-ci.yml
      - scripts/build_bundle_archive.sh
      - crates/ferritex-bench/**
      - crates/ferritex-cli/**
      - Cargo.toml
      - Cargo.lock
      - README.md
      - docs/planning_report.md
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build bundle archive
        run: |
          set -euo pipefail
          bash scripts/build_bundle_archive.sh "${RUNNER_TEMP}/FTX-ASSET-BUNDLE-001.tar.gz"
          tar -tzf "${RUNNER_TEMP}/FTX-ASSET-BUNDLE-001.tar.gz" > /dev/null

      - name: Upload bundle archive
        uses: actions/upload-artifact@v4
        with:
          name: ferritex-bundle-archive
          path: ${{ runner.temp }}/FTX-ASSET-BUNDLE-001.tar.gz
          if-no-files-found: error

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-archive
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download bundle archive
        uses: actions/download-artifact@v4
        with:
          name: ferritex-bundle-archive
          path: ${{ runner.temp }}/bundle-archive

      - name: Expand archive artifact
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bundle-expanded"
          tar -xzf "${RUNNER_TEMP}/bundle-archive/FTX-ASSET-BUNDLE-001.tar.gz" -C "${RUNNER_TEMP}/bundle-expanded"
          test -f "${RUNNER_TEMP}/bundle-expanded/FTX-ASSET-BUNDLE-001/manifest.json"
          echo "FERRITEX_BUNDLE_ARCHIVE=${RUNNER_TEMP}/bundle-archive/FTX-ASSET-BUNDLE-001.tar.gz" >> "$GITHUB_ENV"

      - name: Run bundle archive smoke test
        run: cargo test -p ferritex-cli --test bench_bundle_bootstrap -- bundle_archive_smoke_proof
